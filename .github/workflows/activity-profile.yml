name: Update activity
on:
  schedule: 
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity-update:
    name: Update activity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update with about me
        run: python generate_image.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Artin karimi"
          git config --global user.email "artin962354@proton.me"
          git add .
          git commit -m "Update svg"
          git push
