name: Update activity
on:
  schedule: 
    - cron: '0 * * * *' 
  workflow_dispatch:
permissions:
  contents: write 

jobs:
  activity-update:
    name: Update activity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update with about me
        run: pip3 install requests; python3 generate_image.py
      - name: Push
        run: git config --global user.name "Github actions"; git config --global user.email "actions@github.com"; git add .; git commit -m "Update svg"; git push